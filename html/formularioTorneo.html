<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Torneo</title>
    <link rel="icon" type="image/png" href="../img/logoapp2.jpeg">
    <link rel="stylesheet" href="../css/inicio.css">
    <link rel="stylesheet" href="../css/formularioTorneo.css">
</head>
<body>
    
    <input type="checkbox" id="menu-toggle" class="menu-checkbox" style="display: none;">

    <div class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Menú</span>
            <label for="menu-toggle" class="close-sidebar-btn" aria-label="Cerrar menú">&times;</label>
        </div>
        
        <nav class="sidebar-nav">
            <a href="inicio.html" class="sidebar-link">Inicio</a>
            <a href="#" class="sidebar-link">Calendario de torneos</a>
            <a href="formularioTorneo.html" class="sidebar-link active">Crea tu torneo</a>
            <a href="#" class="sidebar-link">Configuración</a>
        </nav>

        <div class="sidebar-footer">
            <div class="theme-switch-container">
                <span class="theme-label">Modo Oscuro</span>
                <button class="theme-toggle-btn" aria-label="Cambiar tema">
                    <span class="theme-toggle-icon">🌙</span>
                </button>
            </div>
        </div>
    </div>

    <label for="menu-toggle" class="sidebar-overlay"></label>
    
    <nav class="navbar" aria-label="Navegación principal">
        <label for="menu-toggle" class="nav-button" aria-label="Abrir menú de navegación">
            <div class="hamburger-box">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </div>
        </label>

        <form action="busquedaTorneo.html" method="GET" class="search-form" style="display: flex; flex: 1; max-width: 420px; margin: 0 12px;">
            <div class="search-container" style="margin: 0; width: 100%;">
                <svg class="search-google-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#777777"/>
                </svg>
                <input type="text" class="search-input" placeholder="Buscar un torneo" aria-label="Buscar torneos" name="query">
            </div>
        </form>

        <details class="profile-dropdown">
            <summary class="profile-dropdown-button" aria-label="Menú de usuario">
                <div class="user-avatar">
                    <span class="avatar-icon">👤</span>
                </div>
            </summary>
            
            <div class="profile-menu-card">
                <div class="profile-menu-header">
                    <span class="profile-menu-name">Usuario</span>
                </div>
                <div class="profile-menu-divider"></div>
                <nav class="profile-menu-links">
                    <a href="login.html" class="profile-menu-item">
                        <span class="item-icon">➜]</span> Iniciar sesión
                    </a>
                    <a href="perfil.html" class="profile-menu-item">
                        <span class="item-icon">👤</span> Perfil
                    </a>
                    <a href="#" class="profile-menu-item">
                        <span class="item-icon">⚙️</span> Configuración
                    </a>
                    <div class="profile-menu-divider"></div>
                    <a href="#" class="profile-menu-item logout-item">
                        <span class="item-icon">🚪</span> Cierre de sesión
                    </a>
                </nav>
            </div>
        </details>
    </nav>

    <main class="main-container">
        <div class="container">
            <div class="app-logo-container">
                <img src="../img/logoapp2.jpeg" alt="Logo Aplicación" class="app-logo">
            </div>

            <h2>Crear Nuevo Torneo</h2>
            
            <form id="formCrearTorneo" action="#" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label for="nombre">Nombre del Torneo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Torneo Relámpago" required>
                </div>

                <div class="form-group">
                    <label for="disciplina">Disciplina</label>
                    <select id="disciplina" name="disciplina" required>
                        <option value="" disabled selected>Seleccione una opción</option>
                        <option value="futbol">Fútbol</option>
                        <option value="ajedrez">Ajedrez</option>
                        <option value="videojuegos">Esports</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="tipoTorneo">Formato de Clasificación</label>
                        <select id="tipoTorneo" name="tipoTorneo" required>
                            <option value="" disabled selected>Seleccione el formato</option>
                            <option value="eliminacion">Eliminación Directa (Llaves automáticas)</option>
                            <option value="suizo">Sistema Suizo (Rendimiento acumulado)</option>
                        </select>
                    </div>

                    <div class="form-group flex-1">
                        <label for="modalidad">Modalidad</label>
                        <select id="modalidad" name="modalidad" required onchange="cambiarLabelParticipantes()">
                            <option value="equipos" selected>Por Equipos</option>
                            <option value="individual">Individual</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="fecha">Fecha de Inicio</label>
                        <input type="date" id="fecha" name="fecha" required>
                    </div>

                    <div class="form-group flex-1">
                        <label for="hora">Hora de Inicio</label>
                        <input type="time" id="hora" name="hora" required>
                    </div>
                </div>

                <div class="form-group">
                    <label id="label-participantes" for="participantes">Cantidad de Equipos</label>
                    <input type="number" id="participantes" name="participantes" min="2" placeholder="Ej: 16" required>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="imagen">Imagen o Logo del Torneo</label>
                        <input type="file" id="imagen" name="imagen" accept="image/*">
                    </div>

                    <div class="form-group flex-1">
                        <label for="colorTorneo">Color para Visualización</label>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="color" id="colorTorneo" name="colorTorneo" value="#007bff" style="width: 60px; height: 38px; border: none; border-radius: 4px; cursor: pointer; background: none;">
                            <span style="font-size: 13px; color: #888;">Paleta del Torneo</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción del Torneo</label>
                    <textarea id="descripcion" name="descripcion" rows="4" placeholder="Escribe las reglas, premios, requerimientos o información relevante aquí..." style="width: 100%; background-color: #2d2d2d; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 5px; font-size: 14px; box-sizing: border-box; resize: vertical;" required></textarea>
                </div>

                <div class="form-group">
                    <label for="ubicacion">Ubicación del Torneo</label>
                    <input type="text" id="ubicacion" name="ubicacion" placeholder="Ej: Canchas Centenario, Montevideo">
                    <div class="map-container" style="margin-top: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #444;">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d104743.7171408018!2d-56.23932753232675!3d-34.868919634990664!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x959f80ffc63bf7d3%3A0x6b28d2cfd1b3e6d5!2sMontevideo%2C%20Departamento%20de%20Montevideo!5e0!3m2!1ses!2suy!4v1718710000000!5m2!1ses!2suy" 
                            width="100%" 
                            height="220" 
                            style="border:0;" 
                            allowfullscreen="" 
                            loading="lazy" 
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-cancel" onclick="window.location.href='inicio.html';">Cancelar</button>
                    <button type="submit" class="btn btn-submit">Crear Torneo</button>
                </div>
            </form>

        </div>
    </main>

     <footer class="main-footer">
        <div class="footer-content">
            <img src="../img/epsilonSoftware2.png" alt="Logo Epsilon Software" class="footer-logo">
        
            <div class="footer-right-group">
                <nav class="footer-links" aria-label="Enlaces de pie de página">
                    <a href="#" class="footer-link">Sobre nosotros</a>
                    <a href="#" class="footer-link">Ayuda</a>
                </nav>
                <p class="footer-copyright">&copy; 2026 Epsilon Software. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        // Función dinámica para cambiar labels (Individual vs Equipos)
        function cambiarLabelParticipantes() {
            const modalidad = document.getElementById('modalidad').value;
            const label = document.getElementById('label-participantes');
            const input = document.getElementById('participantes');
            
            if (modalidad === 'individual') {
                label.textContent = 'Cantidad de Participantes';
                input.placeholder = 'Ej: 32';
            } else {
                label.textContent = 'Cantidad de Equipos';
                input.placeholder = 'Ej: 16';
            }
        }

        // Envío de Formulario e Historial original
        document.getElementById('formCrearTorneo').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const tipo = document.getElementById('tipoTorneo').value;
            const nombre = document.getElementById('nombre').value;
            
            if (tipo === 'eliminacion') {
                alert(`Torneo "${nombre}" configurado con formato Eliminación Directa. El sistema creará las llaves y las actualizará automáticamente ronda por ronda.`);
            } else if (tipo === 'suizo') {
                alert(`Torneo "${nombre}" configurado con Sistema Suizo. Los emparejamientos se calcularán según el rendimiento acumulado evitando repeticiones.`);
            }
            
            window.location.href = 'inicio.html';
        });
    </script>
</body>
</html>
