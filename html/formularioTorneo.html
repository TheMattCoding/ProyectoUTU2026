<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <link rel="icon" type="image/png" href="../img/logoapp2.jpeg">
     <link rel="stylesheet" href="../css/inicio.css">
    <link rel="stylesheet" href="../css/formularioTorneo.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">Menú</span>
            <label for="menu-toggle" class="close-sidebar-btn" aria-label="Cerrar menú">&times;</label>
        </div>
        
        <nav class="sidebar-nav">
            <a href="inicio.html" class="sidebar-link active">Inicio</a>
            <a href="#" class="sidebar-link">Calendario de torneos</a>
            <a href="formularioTorneo.html" class="sidebar-link">Crea tu torneo</a>
            <a href="#" class="sidebar-link">Configuración</a>
        </nav>

        <div class="sidebar-footer">
            <div class="theme-switch-container">
                <span class="theme-label">Modo Oscuro</span>
                <button class="theme-toggle-btn" aria-label="Cambiar tema">
                    <span class="theme-toggle-icon">🌙</span>
                </button>
            </div>
        </div>
    </div>

    <label for="menu-toggle" class="sidebar-overlay"></label>

    <nav class="navbar" aria-label="Navegación principal">
        <label for="menu-toggle" class="nav-button" aria-label="Abrir menú de navegación">
            <div class="hamburger-box">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </div>
        </label>

        <form action="busquedaTorneo.html" method="GET" class="search-form" style="display: flex; flex: 1; max-width: 420px; margin: 0 12px;">
            <div class="search-container" style="margin: 0; width: 100%;">
                <svg class="search-google-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#777777"/>
                </svg>
                <input type="text" class="search-input" placeholder="Buscar un torneo" aria-label="Buscar torneos" name="query">
            </div>
        </form>

        <details class="profile-dropdown">
            <summary class="profile-dropdown-button" aria-label="Menú de usuario">
                <div class="user-avatar">
                    <span class="avatar-icon">👤</span>
                </div>
            </summary>
            
            <div class="profile-menu-card">
                <div class="profile-menu-header">
                    <span class="profile-menu-name">Usuario</span>
                </div>
                <div class="profile-menu-divider"></div>
                <nav class="profile-menu-links">
                    <a href="login.html" class="profile-menu-item">
                        <span class="item-icon">➜]</span> Iniciar sesión
                    </a>
                    <a href="perfil.html" class="profile-menu-item">
                        <span class="item-icon">👤</span> Perfil
                    </a>
                    <a href="#" class="profile-menu-item">
                        <span class="item-icon">⚙️</span> Configuración
                    </a>
                    <div class="profile-menu-divider"></div>
                    <a href="#" class="profile-menu-item logout-item">
                        <span class="item-icon">🚪</span> Cierre de sesión
                    </a>
                </nav>
            </div>
        </details>
    </nav>

    <main class="main-container">
    


    <div class="container">
        <div class="app-logo-container">
            <img src="../img/logoapp2.jpeg" alt="Logo Aplicación" class="app-logo">
        </div>

        <h2>Crear Nuevo Torneo</h2>
        
        <form id="formCrearTorneo" action="#" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre del Torneo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Torneo Relámpago" required>
            </div>

            <div class="form-group">
                <label for="disciplina">Disciplina</label>
                <select id="disciplina" name="disciplina" required>
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="futbol">Fútbol</option>
                    <option value="ajedrez">Ajedrez</option>
                    <option value="videojuegos">Esports</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipoTorneo">Tipo de Torneo</label>
                <select id="tipoTorneo" name="tipoTorneo" required>
                    <option value="" disabled selected>Seleccione el formato</option>
                    <option value="eliminacion">Eliminación Directa (Llaves automáticas)</option>
                    <option value="suizo">Sistema Suizo (Rendimiento acumulado)</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group flex-1">
                    <label for="fecha">Fecha de Inicio</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="form-group flex-1">
                    <label for="hora">Hora de Inicio</label>
                    <input type="time" id="hora" name="hora" required>
                </div>
            </div>

            <div class="form-group">
                <label for="participantes">Cantidad de Participantes</label>
                <input type="text" id="participantes" name="participantes" placeholder="Ej: 16" required>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-cancel" onclick="window.location.href='inicio.html';">Cancelar</button>
                <button type="submit" class="btn btn-submit">Crear Torneo</button>
            </div>
        </form>

        <div class="company-logo-container">
            <img src="../img/epsilonSoftware2.png" alt="Logo Empresa" class="company-logo">
        </div>
    </div>

    <script>
        document.getElementById('formCrearTorneo').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const tipo = document.getElementById('tipoTorneo').value;
            const nombre = document.getElementById('nombre').value;
            
            if (tipo === 'eliminacion') {
                alert(`Torneo "${nombre}" configurado con formato Eliminación Directa. El sistema creará las llaves y las actualizará automáticamente ronda por ronda.`);
            } else if (tipo === 'suizo') {
                alert(`Torneo "${nombre}" configurado con Sistema Suizo. Los emparejamientos se calcularán según el rendimiento acumulado evitando repeticiones.`);
            }
            
            window.location.href = 'inicio.html';
        });
    </script>
</body>
</html>
