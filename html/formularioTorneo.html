<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Torneo</title>
     <link rel="icon" type="image/png" href="../img/logoapp2.jpeg">
    <link rel="stylesheet" href="../css/formularioTorneo.css">
</head>
<body>

    <div class="container">
        <div class="app-logo-container">
            <img src="../img/logoapp2.jpeg" alt="Logo Aplicación" class="app-logo">
        </div>

        <h2>Crear Nuevo Torneo</h2>
        
        <form id="formCrearTorneo" action="#" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre del Torneo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Torneo Relámpago" required>
            </div>

            <div class="form-group">
                <label for="disciplina">Disciplina</label>
                <select id="disciplina" name="disciplina" required>
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="futbol">Fútbol</option>
                    <option value="ajedrez">Ajedrez</option>
                    <option value="videojuegos">Esports</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tipoTorneo">Tipo de Torneo</label>
                <select id="tipoTorneo" name="tipoTorneo" required>
                    <option value="" disabled selected>Seleccione el formato</option>
                    <option value="eliminacion">Eliminación Directa (Llaves automáticas)</option>
                    <option value="suizo">Sistema Suizo (Rendimiento acumulado)</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group flex-1">
                    <label for="fecha">Fecha de Inicio</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="form-group flex-1">
                    <label for="hora">Hora de Inicio</label>
                    <input type="time" id="hora" name="hora" required>
                </div>
            </div>

            <div class="form-group">
                <label for="participantes">Cantidad de Participantes</label>
                <input type="text" id="participantes" name="participantes" placeholder="Ej: 16" required>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-cancel" onclick="window.location.href='inicio.html';">Cancelar</button>
                <button type="submit" class="btn btn-submit">Crear Torneo</button>
            </div>
        </form>

        <div class="company-logo-container">
            <img src="../img/epsilonSoftware2.png" alt="Logo Empresa" class="company-logo">
        </div>
    </div>

    <script>
        document.getElementById('formCrearTorneo').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const tipo = document.getElementById('tipoTorneo').value;
            const nombre = document.getElementById('nombre').value;
            
            if (tipo === 'eliminacion') {
                alert(`Torneo "${nombre}" configurado con formato Eliminación Directa. El sistema creará las llaves y las actualizará automáticamente ronda por ronda.`);
            } else if (tipo === 'suizo') {
                alert(`Torneo "${nombre}" configurado con Sistema Suizo. Los emparejamientos se calcularán según el rendimiento acumulado evitando repeticiones.`);
            }
            
            window.location.href = 'inicio.html';
        });
    </script>
</body>
</html>
