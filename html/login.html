<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SGDM</title>
    <link rel="icon" type="image/png" href="../img/logoapp2.jpeg">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <img src="../img/logoapp2.jpeg" alt="Logo SGDM" class="logo-img">
        </div>

        <h1 class="greeting">¡Hola! Que gusto verte de nuevo</h1>

        <form class="login-form">
            <div class="input-group">
                <input type="email" id="email" required placeholder="Correo Electrónico">
            </div>
            
            <div class="input-group">
                <input type="password" id="password" required placeholder="Contraseña">
            </div>

            <div class="forgot-password">
                <a href="#">Olvidaste tu contraseña</a>
            </div>

            <button type="submit" class="btn-primary">INICIAR SESIÓN</button>
        </form>

        <div class="divider">
            <span>o</span>
        </div>

        <p class="social-text">Continuar con</p>

        <div class="social-buttons">
            <button type="button" class="btn-social apple">
                <i class="fab fa-apple"></i> Apple
            </button>
            <button type="button" class="btn-social google">
                <i class="fab fa-google"></i> Google
            </button>
            <button type="button" class="btn-social facebook">
                <i class="fab fa-facebook-f"></i> Facebook
            </button>
        </div>

        <div class="register-link">
            ¿No tienes una cuenta? <a href="#">Registrar</a>
        </div>
    </div>
</body>
</html>
